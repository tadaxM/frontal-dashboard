<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フロンタル 予算実績ダッシュボード</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 2px solid #2c5f8a;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 1.8em;
            color: #2c5f8a;
            margin-bottom: 5px;
        }
        header .subtitle {
            font-size: 0.95em;
            color: #666;
        }
        .update-info {
            text-align: right;
            font-size: 0.85em;
            color: #888;
            margin-bottom: 20px;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #2c5f8a;
        }
        .card.green { border-left-color: #28a745; }
        .card.orange { border-left-color: #fd7e14; }
        .card.red { border-left-color: #dc3545; }
        .card h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }
        .card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        .card .detail {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
        }
        .card .rate {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 5px;
        }
        .rate.good { color: #28a745; }
        .rate.warn { color: #fd7e14; }
        .rate.bad { color: #dc3545; }
        .section {
            margin-bottom: 40px;
        }
        .section h2 {
            font-size: 1.3em;
            color: #2c5f8a;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9em;
        }
        th, td {
            padding: 10px 12px;
            text-align: right;
            border-bottom: 1px solid #dee2e6;
        }
        th {
            background: #f1f3f5;
            font-weight: 600;
            color: #495057;
        }
        th:first-child, td:first-child {
            text-align: left;
        }
        tr:hover { background: #f8f9fa; }
        .positive { color: #28a745; }
        .negative { color: #dc3545; }
        .note {
            font-size: 0.8em;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 0.8em;
            border-top: 1px solid #eee;
            margin-top: 40px;
        }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            header h1 { font-size: 1.4em; }
            .card .value { font-size: 1.4em; }
            table { font-size: 0.8em; }
            th, td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>フロンタル株式会社 予算実績ダッシュボード</h1>
            <div class="subtitle">2026年度（1月〜3月）</div>
        </header>

        <div class="update-info">
            最終更新: 2026年3月31日 ｜ データソース: DriveDoor日報（3/26取得分 + FJS 3/28取得分）
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards" id="summaryCards"></div>

        <!-- 一般売上セクション -->
        <div class="section">
            <h2>一般売上</h2>
            <div class="chart-container">
                <canvas id="chartGeneral"></canvas>
            </div>
            <table id="tableGeneral"></table>
        </div>

        <!-- 利用売上セクション -->
        <div class="section">
            <h2>利用売上</h2>
            <div class="chart-container">
                <canvas id="chartUsage"></canvas>
            </div>
            <table id="tableUsage"></table>
        </div>

        <!-- 外注費セクション -->
        <div class="section">
            <h2>外注費</h2>
            <div class="chart-container">
                <canvas id="chartOutsource"></canvas>
            </div>
            <table id="tableOutsource"></table>
            <p class="note">※ 外注費は低いほど良好。達成率が100%以下の場合、予算内に収まっていることを示します。</p>
        </div>

        <!-- 累計進捗 -->
        <div class="section">
            <h2>1Q累計進捗（1月〜3月）</h2>
            <div class="chart-container">
                <canvas id="chartCumulative"></canvas>
            </div>
            <table id="tableCumulative"></table>
            <p class="note">※ 3月は月途中のデータ（〜3/26時点）のため、最終実績は変動します。</p>
        </div>

        <footer>
            フロンタル株式会社 管理部 ｜ 自動生成レポート
        </footer>
    </div>

    <script>
        // === DATA ===
        const months = ['1月', '2月', '3月'];

        const data = {
            general: {
                label: '一般売上',
                budget: [40260, 41100, 54000],
                actual: [42569, 43081, 29320]
            },
            usage: {
                label: '利用売上',
                budget: [15800, 19500, 18200],
                actual: [16817, 20562, 6333]
            },
            outsource: {
                label: '外注費',
                budget: [16000, 19000, 15000],
                actual: [16323, 19605, 9286]
            }
        };

        // === HELPER FUNCTIONS ===
        function formatNum(n) {
            return n.toLocaleString('ja-JP');
        }

        function calcRate(actual, budget) {
            return budget > 0 ? (actual / budget * 100) : 0;
        }

        function rateClass(rate, isExpense) {
            if (isExpense) {
                return rate <= 100 ? 'good' : rate <= 110 ? 'warn' : 'bad';
            }
            return rate >= 100 ? 'good' : rate >= 90 ? 'warn' : 'bad';
        }

        function cardClass(rate, isExpense) {
            if (isExpense) {
                return rate <= 100 ? 'green' : rate <= 110 ? 'orange' : 'red';
            }
            return rate >= 100 ? 'green' : rate >= 90 ? 'orange' : 'red';
        }

        // === SUMMARY CARDS ===
        function renderSummary() {
            const container = document.getElementById('summaryCards');
            const items = [
                { key: 'general', name: '一般売上（1Q累計）', isExpense: false },
                { key: 'usage', name: '利用売上（1Q累計）', isExpense: false },
                { key: 'outsource', name: '外注費（1Q累計）', isExpense: true }
            ];

            items.forEach(item => {
                const d = data[item.key];
                const totalBudget = d.budget.reduce((a, b) => a + b, 0);
                const totalActual = d.actual.reduce((a, b) => a + b, 0);
                const rate = calcRate(totalActual, totalBudget);
                const diff = totalActual - totalBudget;
                const cls = cardClass(rate, item.isExpense);
                const rCls = rateClass(rate, item.isExpense);

                container.innerHTML += `
                    <div class="card ${cls}">
                        <h3>${item.name}</h3>
                        <div class="value">${formatNum(totalActual)} <span style="font-size:0.5em">千円</span></div>
                        <div class="detail">予算: ${formatNum(totalBudget)}千円｜ 差痃: <span class="${diff >= 0 ? (item.isExpense ? 'negative' : 'positive') : (item.isExpense ? 'positive' : 'negative')}">${diff >= 0 ? '+' : ''}${formatNum(diff)}千円</span></div>
                        <div class="rate ${rCls}">達成率: ${rate.toFixed(1)}%</div>
                    </div>
                `;
            });
        }

        // === CHARTS ===
        function createBarChart(canvasId, label, budgetData, actualData, color) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [
                        {
                            label: '予算',
                            data: budgetData,
                            backgroundColor: 'rgba(44, 95, 138, 0.3)',
                            borderColor: 'rgba(44, 95, 138, 1)',
                            borderWidth: 1
                        },
                        {
                            label: '実績',
                            data: actualData,
                            backgroundColor: color + '80',
                            borderColor: color,
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: label + '（予算 vs 実績）',
                            font: { size: 14 }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + formatNum(context.raw) + '千円';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) { return formatNum(value) + '千円'; }
                            }
                        }
                    }
                }
            });
        }

        // === TABLES ===
        function createTable(tableId, d, isExpense) {
            const table = document.getElementById(tableId);
            let html = `
                <thead>
                    <tr>
                        <th>月</th>
                        <th>予算（千円）</th>
                        <th>実績（千円）</th>
                        <th>差異（千円）</th>
                        <th>達成率</th>
                    </tr>
                </thead>
                <tbody>
            `;

            let totalBudget = 0, totalActual = 0;
            for (let i = 0; i < months.length; i++) {
                const budget = d.budget[i];
                const actual = d.actual[i];
                const diff = actual - budget;
                const rate = calcRate(actual, budget);
                const diffClass = diff >= 0 ? (isExpense ? 'negative' : 'positive') : (isExpense ? 'possitive' : 'negative');
                const rCls = rateClass(rate, isExpense);
                totalBudget += budget;
                totalActual += actual;

                html += `
                    <tr>
                        <td>${months[i]}${i === 2 ? ' *' : ''}</td>
                        <td>${formatNum(budget)}</td>
                        <td>${formatNum(actual)}</td>
                        <td class="${diffClass}">${diff >= 0 ? '+' : ''}${formatNum(diff)}</td>
                        <td class="rate ${rCls}">${rate.toFixed(1)}%</td>
                    </tr>
                `;
            }

            const totalDiff = totalActual - totalBudget;
            const totalRate = calcRate(totalActual, totalBudget);
            const totalDiffClass = totalDiff >= 0 ? (isExpense ? 'negative' : 'positive') : (isExpense ? 'positive' : 'negative');
            const totalRCls = rateClass(totalRate, isExpense);

            html += `
                    <tr style="font-weight:bold; border-top:2px solid #333;">
                        <td>累計</td>
                        <td>${formatNum(totalBudget)}</td>
                        <td>${formatNum(totalActual)}</td>
                        <td class="${totalDiffClass}">${totalDiff >= 0 ? '+' : ''}${formatNum(totalDiff)}</td>
                        <td class="rate ${totalRCls}">${totalRate.toFixed(1)}%</td>
                    </tr>
                </tbody>
            `;

            table.innerHTML = html;
        }

        // === CUMULATIVE CHART ===
        function createCumulativeChart() {
            const ctx = document.getElementById('chartCumulative').getContext('2d');

            const categories = ['一般売上', '利用売上', '外注費'];
            const budgets = [
                data.general.budget.reduce((a, b) => a + b, 0),
                data.usage.budget.reduce((a, b) => a + b, 0),
                data.outsource.budget.reduce((a, b) => a + b, 0)
            ];
            const actuals = [
                data.general.actual.reduce((a, b) => a + b, 0),
                data.usage.actual.reduce((a, b) => a + b, 0),
                data.outsource.actual.reduce((a, b) => a + b, 0)
            ];

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: categories,
                    datasets: [
                        {
                            label: '予算（1Q累計）',
                            data: budgets,
                            backgroundColor: 'rgba(44, 95, 138, 0.3)',
                            borderColor: 'rgba(44, 95, 138, 1)',
                            borderWidth: 1
                        },
                        {
                            label: '実績（1Q累計）',
                            data: actuals,
                            backgroundColor: ['rgba(40, 167, 69, 0.5)', 'rgba(0, 123, 255, 0.5)', 'rgba(253, 126, 20, 0.5)'],
                            borderColor: ['#28a745', '#007bff', '#fd7e14'],
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: '1Q累計 予算 vs 実績',
                            font: { size: 14 }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + formatNum(context.raw) + '千円';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) { return formatNum(value) + '千円'; }
                            }
                        }
                    }
                }
            });
        }

        function createCumulativeTable() {
            const table = document.getElementById('tableCumulative');
            const items = [
                { name: '一般売上', d: data.general, isExpense: false },
                { name: '利用売上', d: data.usage, isExpense: false },
                { name: '外注費', d: data.outsource, isExpense: true }
            ];

            let html = `
                <thead>
                    <tr>
                        <th>項目</th>
                        <th>予算（千円）</th>
                        <th>実績（千円）</th>
                        <th>差異（千円）</th>
                        <th>達成率</th>
                    </tr>
                </thead>
                <tbody>
            `;

            items.forEach(item => {
                const budget = item.d.budget.reduce((a, b) => a + b, 0);
                const actual = item.d.actual.reduce((a, b) => a + b, 0);
                const diff = actual - budget;
                const rate = calcRate(actual, budget);
                const diffClass = diff >= 0 ? (item.isExpense ? 'negative' : 'positive') : (item.isExpense ? 'positive' : 'negative');
                const rCls = rateClass(rate, item.isExpense);

                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${formatNum(budget)}</td>
                        <td>${formatNum(actual)}</td>
                        <td class="${diffClass}">${diff >= 0 ? '+' : ''}${formatNum(diff)}</td>
                        <td class="rate ${rCls}">${rate.toFixed(1)}%</td>
                    </tr>
                `;
            });

            html += '</tbody>';
            table.innerHTML = html;
        }

        // === INIT ===
        renderSummary();
        createBarChart('chartGeneral', '一般売上', data.general.budget, data.general.actual, '#28a745');
        createBarChart('chartUsage', '利用売上', data.usage.budget, data.usage.actual, '#007bff');
        createBarChart('chartOutsource', '外注費', data.outsource.budget, data.outsource.actual, '#fd7e14');
        createTable('tableGeneral', data.general, false);
        createTable('tableUsage', data.usage, false);
        createTable('tableOutsource', data.outsource, true);
        createCumulativeChart();
        createCumulativeTable();
    </script>
</body>
</html>
