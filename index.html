<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フロンタル 予算実績ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: #ffffff; color: #333; line-height: 1.6; }
.container { max-width: 1100px; margin: 0 auto; padding: 16px; }
header { text-align: center; padding: 24px 0 8px; border-bottom: 2px solid #2563eb; margin-bottom: 24px; }
header h1 { font-size: 1.5rem; color: #1e3a5f; font-weight: 700; }
header .subtitle { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }
.update-info { text-align: right; font-size: 0.8rem; color: #9ca3af; margin-bottom: 16px; }
.summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.card { background: #f8fafc; border-radius: 8px; padding: 16px; border-left: 4px solid #2563eb; }
.card.green { border-left-color: #10b981; }
.card.red { border-left-color: #ef4444; }
.card.orange { border-left-color: #f59e0b; }
.card .label { font-size: 0.8rem; color: #6b7280; }
.card .value { font-size: 1.4rem; font-weight: 700; color: #1e3a5f; }
.card .sub { font-size: 0.75rem; color: #9ca3af; }
.section { margin-bottom: 32px; }
.section h2 { font-size: 1.1rem; color: #1e3a5f; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; margin-bottom: 16px; }
.chart-container { position: relative; height: 300px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 8px 12px; text-align: right; border-bottom: 1px solid #e5e7eb; }
th { background: #f1f5f9; color: #475569; font-weight: 600; }
td:first-child, th:first-child { text-align: left; }
tr:hover { background: #f8fafc; }
.positive { color: #10b981; }
.negative { color: #ef4444; }
.rate-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
.rate-over { background: #dcfce7; color: #166534; }
.rate-under { background: #fee2e2; color: #991b1b; }
@media (max-width: 600px) {
  .container { padding: 8px; }
  header h1 { font-size: 1.2rem; }
  .chart-container { height: 250px; }
  table { font-size: 0.75rem; }
  th, td { padding: 6px 8px; }
}
footer { text-align: center; padding: 16px 0; color: #9ca3af; font-size: 0.75rem; border-top: 1px solid #e5e7eb; margin-top: 24px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>フロンタル 予算実績ダッシュボード</h1>
    <div class="subtitle">Budget vs Actual Dashboard — Powered by DriveDoor</div>
  </header>
  <div class="update-info">最終更新: <span id="updateDate"></span> ｜ データ取得日: 2026/04/03</div>
  <div class="summary-cards" id="summaryCards"></div>
  <div class="section">
    <h2>一般売上（一般貨物）</h2>
    <div class="chart-container"><canvas id="ippanChart"></canvas></div>
    <table id="ippanTable"></table>
  </div>
  <div class="section">
    <h2>利用売上（利用貨物）</h2>
    <div class="chart-container"><canvas id="riyoChart"></canvas></div>
    <table id="riyoTable"></table>
  </div>
  <div class="section">
    <h2>外注費</h2>
    <div class="chart-container"><canvas id="gaichuChart"></canvas></div>
    <table id="gaichuTable"></table>
  </div>
  <div class="section">
    <h2>累計進捗（1月〜3月）</h2>
    <table id="cumulativeTable"></table>
  </div>
  <footer>フロンタル株式会社 ｜ データソース: DriveDoor ｜ 自動生成レポート</footer>
</div>
<script>
const actual={1:{ippan:42569,riyo:21631,gaichu:16323},2:{ippan:43081,riyo:25220,gaichu:19605},3:{ippan:43981,riyo:13371,gaichu:12377},4:{ippan:334,riyo:0,gaichu:0}};
const budget={1:{ippan:40260,riyo:15800,gaichu:16000},2:{ippan:41100,riyo:19500,gaichu:19000},3:{ippan:54000,riyo:18200,gaichu:15000},4:{ippan:42500,riyo:17000,gaichu:16500},5:{ippan:43800,riyo:18500,gaichu:17000},6:{ippan:44200,riyo:19000,gaichu:17500},7:{ippan:45000,riyo:20000,gaichu:18000},8:{ippan:43500,riyo:19200,gaichu:17200},9:{ippan:44800,riyo:19800,gaichu:17800},10:{ippan:45500,riyo:20500,gaichu:18200},11:{ippan:44000,riyo:19500,gaichu:17500},12:{ippan:46000,riyo:21000,gaichu:18500}};
const months=['1月','2月','3月','4月'];
const monthKeys=[1,2,3,4];
const completedMonths=[1,2,3];
function fmt(n){return n.toLocaleString('ja-JP')}
function pct(a,b){return b===0?'-':(a/b*100).toFixed(1)+'%'}
function rateBadge(a,b,isExpense){if(b===0)return'-';const rate=a/b*100;if(isExpense){return rate<=100?'<span class="rate-badge rate-over">'+rate.toFixed(1)+'%</span>':'<span class="rate-badge rate-under">'+rate.toFixed(1)+'%</span>'}else{return rate>=100?'<span class="rate-badge rate-over">'+rate.toFixed(1)+'%</span>':'<span class="rate-badge rate-under">'+rate.toFixed(1)+'%</span>'}}
function diffClass(diff,isExpense){if(isExpense)return diff<=0?'positive':'negative';return diff>=0?'positive':'negative'}
document.getElementById('updateDate').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
(function(){const cumActIppan=completedMonths.reduce((s,m)=>s+actual[m].ippan,0);const cumBudIppan=completedMonths.reduce((s,m)=>s+budget[m].ippan,0);const cumActRiyo=completedMonths.reduce((s,m)=>s+actual[m].riyo,0);const cumBudRiyo=completedMonths.reduce((s,m)=>s+budget[m].riyo,0);const cumActGaichu=completedMonths.reduce((s,m)=>s+actual[m].gaichu,0);const cumBudGaichu=completedMonths.reduce((s,m)=>s+budget[m].gaichu,0);const cumActTotal=cumActIppan+cumActRiyo;const cumBudTotal=cumBudIppan+cumBudRiyo;const cards=[{label:'売上合計（1-3月累計）',value:fmt(cumActTotal)+'千円',sub:'予算 '+fmt(cumBudTotal)+'千円 / 達成率 '+pct(cumActTotal,cumBudTotal),cls:cumActTotal>=cumBudTotal?'green':''},{label:'一般売上（1-3月累計）',value:fmt(cumActIppan)+'千円',sub:'予算 '+fmt(cumBudIppan)+'千円 / 達成率 '+pct(cumActIppan,cumBudIppan),cls:cumActIppan>=cumBudIppan?'green':'orange'},{label:'利用売上（1-3月累計）',value:fmt(cumActRiyo)+'千円',sub:'予算 '+fmt(cumBudRiyo)+'千円 / 達成率 '+pct(cumActRiyo,cumBudRiyo),cls:cumActRiyo>=cumBudRiyo?'green':'orange'},{label:'外注費（1-3月累計）',value:fmt(cumActGaichu)+'千円',sub:'予算 '+fmt(cumBudGaichu)+'千円 / 予算比 '+pct(cumActGaichu,cumBudGaichu),cls:cumActGaichu<=cumBudGaichu?'green':'red'}];const html=cards.map(c=>'<div class="card '+c.cls+'"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div><div class="sub">'+c.sub+'</div></div>').join('');document.getElementById('summaryCards').innerHTML=html})();
function makeChart(canvasId,label,field,isExpense){const actData=monthKeys.map(m=>actual[m][field]);const budData=monthKeys.map(m=>budget[m][field]);new Chart(document.getElementById(canvasId),{type:'bar',data:{labels:months,datasets:[{label:'実績',data:actData,backgroundColor:isExpense?'rgba(239,68,68,0.7)':'rgba(37,99,235,0.7)',borderRadius:4},{label:'予算',data:budData,backgroundColor:'rgba(209,213,219,0.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:12}}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)+'千円'}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmt(v)},title:{display:true,text:'千円'}}}}})}
function makeTable(tableId,field,isExpense){let html='<thead><tr><th>月</th><th>実績</th><th>予算</th><th>差異</th><th>達成率</th></tr></thead><tbody>';monthKeys.forEach(m=>{const a=actual[m][field];const b=budget[m][field];const diff=isExpense?b-a:a-b;html+='<tr><td>'+m+'月</td><td>'+fmt(a)+'</td><td>'+fmt(b)+'</td><td class="'+diffClass(diff,false)+'">'+(diff>=0?'+':'')+fmt(diff)+'</td><td>'+rateBadge(a,b,isExpense)+'</td></tr>'});html+='</tbody>';document.getElementById(tableId).innerHTML=html}
makeChart('ippanChart','一般売上','ippan',false);
makeChart('riyoChart','利用売上','riyo',false);
makeChart('gaichuChart','外注費','gaichu',true);
makeTable('ippanTable','ippan',false);
makeTable('riyoTable','riyo',false);
makeTable('gaichuTable','gaichu',true);
(function(){const fields=[{key:'ippan',label:'一般売上',isExpense:false},{key:'riyo',label:'利用売上',isExpense:false},{key:'gaichu',label:'外注費',isExpense:true}];let html='<thead><tr><th>科目</th><th>実績累計</th><th>予算累計</th><th>差異</th><th>達成率</th></tr></thead><tbody>';let totalA=0,totalB=0;fields.forEach(f=>{const a=completedMonths.reduce((s,m)=>s+actual[m][f.key],0);const b=completedMonths.reduce((s,m)=>s+budget[m][f.key],0);const diff=f.isExpense?b-a:a-b;if(!f.isExpense){totalA+=a;totalB+=b}html+='<tr><td>'+f.label+'</td><td>'+fmt(a)+'</td><td>'+fmt(b)+'</td><td class="'+diffClass(diff,false)+'">'+(diff>=0?'+':'')+fmt(diff)+'</td><td>'+rateBadge(a,b,f.isExpense)+'</td></tr>'});const gaichuA=completedMonths.reduce((s,m)=>s+actual[m].gaichu,0);const gaichuB=completedMonths.reduce((s,m)=>s+budget[m].gaichu,0);const gpA=totalA-gaichuA;const gpB=totalB-gaichuB;const gpDiff=gpA-gpB;html+='<tr style="font-weight:700;border-top:2px solid #333"><td>売上総利益（売上−外注費）</td><td>'+fmt(gpA)+'</td><td>'+fmt(gpB)+'</td><td class="'+diffClass(gpDiff,false)+'">'+(gpDiff>=0?'+':'')+fmt(gpDiff)+'</td><td>'+rateBadge(gpA,gpB,false)+'</td></tr>';html+='</tbody>';document.getElementById('cumulativeTable').innerHTML=html})();
</script>
</body>
</html>
