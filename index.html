<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フロンタル 予算実績ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: #fff; color: #333; line-height: 1.6; }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; padding: 16px; }
  .card-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .card-value { font-size: 24px; font-weight: 700; }
  .card-sub { font-size: 12px; color: #888; margin-top: 4px; }
  .rate-good { color: #16a34a; }
  .rate-warn { color: #d97706; }
  .rate-bad { color: #dc2626; }
  .section { margin-bottom: 32px; }
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #333; }
  .chart-wrap { position: relative; width: 100%; max-width: 100%; margin-bottom: 16px; }
  canvas { width: 100% !important; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 12px; }
  th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid #e8e8e8; }
  th { background: #f5f5f5; font-weight: 600; font-size: 12px; color: #666; }
  td:first-child, th:first-child { text-align: left; }
  .highlight { background: #fffbeb; }
  .note { font-size: 11px; color: #aaa; margin-top: 8px; }
  @media (max-width: 640px) {
    .container { padding: 12px; }
    h1 { font-size: 18px; }
    .card-value { font-size: 20px; }
    table { font-size: 11px; }
    th, td { padding: 6px 4px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>フロンタル 予算実績ダッシュボード</h1>
  <div class="subtitle" id="updateTime"></div>
  <div class="summary-cards" id="summaryCards"></div>
  <div class="section">
    <div class="section-title">一般売上</div>
    <div class="chart-wrap"><canvas id="chartGeneral" height="260"></canvas></div>
    <table id="tableGeneral"></table>
  </div>
  <div class="section">
    <div class="section-title">利用売上</div>
    <div class="chart-wrap"><canvas id="chartUsage" height="260"></canvas></div>
    <table id="tableUsage"></table>
  </div>
  <div class="section">
    <div class="section-title">外注費</div>
    <div class="chart-wrap"><canvas id="chartOutsource" height="260"></canvas></div>
    <table id="tableOutsource"></table>
  </div>
  <div class="section">
    <div class="section-title">累計進捗（1月〜3月）</div>
    <table id="tableCumulative"></table>
  </div>
  <div class="note">※ 3月は26日時点の実績（月末まで未確定）。データソース: DriveDoor日報 / 車両経費一覧（2026/3/26取得分をフォールバック使用）</div>
</div>
<script>
const DATA={months:['1月','2月','3月'],general:{budget:[40260,41100,54000],actual:[42569,43081,29320]},usage:{budget:[15800,19500,18200],actual:[16817,20562,6333]},outsource:{budget:[16000,19000,15000],actual:[16323,19605,9286]}};
document.getElementById('updateTime').textContent='最終更新: 2026年3月29日（データ: 2026/3/26取得分）';
function pct(a,b){return b?((a/b)*100).toFixed(1):'-';}
function rateClass(r){return r>=90?'rate-good':r>=70?'rate-warn':'rate-bad';}
function fmt(n){return n.toLocaleString();}
(function(){var cGB=DATA.general.budget.reduce(function(s,v){return s+v;},0),cGA=DATA.general.actual.reduce(function(s,v){return s+v;},0),cUB=DATA.usage.budget.reduce(function(s,v){return s+v;},0),cUA=DATA.usage.actual.reduce(function(s,v){return s+v;},0),cOB=DATA.outsource.budget.reduce(function(s,v){return s+v;},0),cOA=DATA.outsource.actual.reduce(function(s,v){return s+v;},0),cSB=cGB+cUB,cSA=cGA+cUA,rS=(cSA/cSB*100).toFixed(1),rG=(cGA/cGB*100).toFixed(1),rU=(cUA/cUB*100).toFixed(1),rO=(cOA/cOB*100).toFixed(1);var cards=[{l:'売上合計（累計）',v:fmt(cSA)+' 千円',s:'予算 '+fmt(cSB)+' 千円　達成率 '+rS+'%',r:rS},{l:'一般売上（累計）',v:fmt(cGA)+' 千円',s:'予算 '+fmt(cGB)+' 千円　達成率 '+rG+'%',r:rG},{l:'利用売上（累計）',v:fmt(cUA)+' 千円',s:'予算 '+fmt(cUB)+' 千円　達成率 '+rU+'%',r:rU},{l:'外注費（累計）',v:fmt(cOA)+' 千円',s:'予算 '+fmt(cOB)+' 千円　執行率 '+rO+'%',r:rO}];var el=document.getElementById('summaryCards');cards.forEach(function(c){var rc=c.l.includes('外注費')?(c.r<=100?'rate-good':'rate-bad'):rateClass(c.r);el.innerHTML+='<div class="card"><div class="card-label">'+c.l+'</div><div class="card-value">'+c.v+'</div><div class="card-sub '+rc+'">'+c.s+'</div></div>';});})();
function makeChart(id,label,budgets,actuals){new Chart(document.getElementById(id),{type:'bar',data:{labels:DATA.months,datasets:[{label:'予算',data:budgets,backgroundColor:'rgba(200,200,200,0.6)',borderColor:'#aaa',borderWidth:1},{label:'実績',data:actuals,backgroundColor:'rgba(59,130,246,0.7)',borderColor:'#3b82f6',borderWidth:1}]},options:{responsive:true,plugins:{legend:{position:'top',labels:{font:{size:12}}},tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y.toLocaleString()+' 千円';}}}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return v.toLocaleString();}},title:{display:true,text:'千円'}}}}});}
makeChart('chartGeneral','一般売上',DATA.general.budget,DATA.general.actual);
makeChart('chartUsage','利用売上',DATA.usage.budget,DATA.usage.actual);
makeChart('chartOutsource','外注費',DATA.outsource.budget,DATA.outsource.actual);
function makeTable(id,budgets,actuals,isExp){var html='<tr><th>月</th><th>予算</th><th>実績</th><th>差異</th><th>'+(isExp?'執行率':'達成率')+'</th></tr>';DATA.months.forEach(function(m,i){var diff=actuals[i]-budgets[i],r=pct(actuals[i],budgets[i]),cls=i===DATA.months.length-1?' class="highlight"':'',ds=diff>=0?'+':'',dc=isExp?(diff<=0?'rate-good':'rate-bad'):(diff>=0?'rate-good':'rate-bad');html+='<tr'+cls+'><td>'+m+'</td><td>'+fmt(budgets[i])+'</td><td>'+fmt(actuals[i])+'</td><td class="'+dc+'">'+ds+fmt(diff)+'</td><td>'+r+'%</td></tr>';});document.getElementById(id).innerHTML=html;}
makeTable('tableGeneral',DATA.general.budget,DATA.general.actual,false);
makeTable('tableUsage',DATA.usage.budget,DATA.usage.actual,false);
makeTable('tableOutsource',DATA.outsource.budget,DATA.outsource.actual,true);
(function(){var items=[{n:'一般売上',b:DATA.general.budget,a:DATA.general.actual,e:false},{n:'利用売上',b:DATA.usage.budget,a:DATA.usage.actual,e:false},{n:'売上合計',b:DATA.general.budget.map(function(v,i){return v+DATA.usage.budget[i];}),a:DATA.general.actual.map(function(v,i){return v+DATA.usage.actual[i];}),e:false},{n:'外注費',b:DATA.outsource.budget,a:DATA.outsource.actual,e:true}];var html='<tr><th>項目</th><th>予算累計</th><th>実績累計</th><th>差異</th><th>達成率/執行率</th></tr>';items.forEach(function(item){var cb=item.b.reduce(function(s,v){return s+v;},0),ca=item.a.reduce(function(s,v){return s+v;},0),diff=ca-cb,r=pct(ca,cb),ds=diff>=0?'+':'',dc=item.e?(diff<=0?'rate-good':'rate-bad'):(diff>=0?'rate-good':'rate-bad');html+='<tr><td>'+item.n+'</td><td>'+fmt(cb)+'</td><td>'+fmt(ca)+'</td><td class="'+dc+'">'+ds+fmt(diff)+'</td><td>'+r+'%</td></tr>';});document.getElementById('tableCumulative').innerHTML=html;})();
</script>
</body>
</html>
