<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フロンタル 予算実績ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Helvetica Neue',Arial,'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;background:#fff;color:#333;padding:20px;max-width:1200px;margin:0 auto}h1{font-size:1.5rem;font-weight:600;margin-bottom:4px;color:#1a1a1a}.subtitle{font-size:.85rem;color:#888;margin-bottom:24px}.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:28px}.kpi-card{background:#f8f9fa;border-radius:8px;padding:16px;border-left:4px solid #4a90d9}.kpi-card.riyo{border-left-color:#50b578}.kpi-card.gaicyu{border-left-color:#e8875a}.kpi-label{font-size:.75rem;color:#888;margin-bottom:4px}.kpi-value{font-size:1.4rem;font-weight:700}.kpi-sub{font-size:.75rem;color:#999;margin-top:2px}.section{margin-bottom:32px}.section-title{font-size:1.1rem;font-weight:600;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #eee}.chart-container{position:relative;height:300px;margin-bottom:16px}table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:8px}th,td{padding:8px 10px;text-align:right;border-bottom:1px solid #eee}th{background:#f8f9fa;font-weight:600;color:#555}td:first-child,th:first-child{text-align:left}.positive{color:#2a9d5c}.negative{color:#d94a4a}.note{font-size:.75rem;color:#aaa;margin-top:4px}.partial{background:#fffbe6}footer{margin-top:32px;padding-top:12px;border-top:1px solid #eee;font-size:.75rem;color:#aaa;text-align:center}@media(max-width:600px){body{padding:12px}.kpi-row{grid-template-columns:1fr}.chart-container{height:250px}table{font-size:.78rem}th,td{padding:6px 4px}}
</style>
</head>
<body>
<h1>フロンタル 予算実績ダッシュボード</h1>
<p class="subtitle">2026年度（1月〜3月実績） ｜ 最終更新: 2026年4月2日 ｜ データソース: DriveDoor（3/26時点のエクスポート）</p>
<div class="kpi-row">
<div class="kpi-card"><div class="kpi-label">一般売上 累計（1-3月）</div><div class="kpi-value" id="kpi-ippan-total"></div><div class="kpi-sub" id="kpi-ippan-rate"></div></div>
<div class="kpi-card riyo"><div class="kpi-label">利用売上 累計（1-3月）</div><div class="kpi-value" id="kpi-riyo-total"></div><div class="kpi-sub" id="kpi-riyo-rate"></div></div>
<div class="kpi-card gaicyu"><div class="kpi-label">外注費 累計（1-3月）</div><div class="kpi-value" id="kpi-gaicyu-total"></div><div class="kpi-sub" id="kpi-gaicyu-rate"></div></div>
</div>
<div class="section"><div class="section-title">一般売上</div><div class="chart-container"><canvas id="chart-ippan"></canvas></div><table id="table-ippan"></table><p class="note">※3月は3/26時点の暫定値です</p></div>
<div class="section"><div class="section-title">利用売上</div><div class="chart-container"><canvas id="chart-riyo"></canvas></div><table id="table-riyo"></table><p class="note">※3月は3/26時点の暫定値です</p></div>
<div class="section"><div class="section-title">外注費</div><div class="chart-container"><canvas id="chart-gaicyu"></canvas></div><table id="table-gaicyu"></table><p class="note">※3月は3/26時点の暫定値です。外注費は予算以下が良好です。</p></div>
<footer>フロンタル株式会社 予算実績管理 ｜ DriveDoor接続不可のためフォールバックデータ使用（3/26エクスポート分）<br>※3月は月途中データのため暫定値です</footer>
<script>
const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];const ci=2;
const data={ippan:{budget:[40260,41100,54000,42500,43800,44200,45000,43500,44800,45500,44000,46000],actual:[42569,43081,29320,null,null,null,null,null,null,null,null,null]},riyo:{budget:[15800,19500,18200,17000,18500,19000,20000,19200,19800,20500,19500,21000],actual:[16817,20562,6333,null,null,null,null,null,null,null,null,null]},gaicyu:{budget:[16000,19000,15000,16500,17000,17500,18000,17200,17800,18200,17500,18500],actual:[16323,19605,9286,null,null,null,null,null,null,null,null,null]}};
function fmt(v){if(v===null||v===undefined)return'-';return v.toLocaleString('ja-JP')}
function pct(a,b){if(!a||!b)return'-';return(a/b*100).toFixed(1)+'%'}
function dc(a,b,e){if(!a||!b)return'';const d=a-b;if(e)return d>0?'negative':'positive';return d>=0?'positive':'negative'}
function uKPI(id,d,e){const bs=d.budget.slice(0,3).reduce((a,b)=>a+b,0);const as=d.actual.slice(0,3).filter(v=>v!==null).reduce((a,b)=>a+b,0);document.getElementById('kpi-'+id+'-total').textContent=fmt(as)+' 千円';const r=(as/bs*100).toFixed(1);const df=as-bs;const c=e?(df>0?'negative':'positive'):(df>=0?'positive':'negative');document.getElementById('kpi-'+id+'-rate').innerHTML='予算 '+fmt(bs)+' 千円 ｜ 達成率 <span class="'+c+'">'+r+'%<\/span>'}
uKPI('ippan',data.ippan,false);uKPI('riyo',data.riyo,false);uKPI('gaicyu',data.gaicyu,true);
function mkC(cid,d,cB,cA){const ctx=document.getElementById(cid).getContext('2d');new Chart(ctx,{type:'bar',data:{labels:months.slice(0,ci+1),datasets:[{label:'予算',data:d.budget.slice(0,ci+1),backgroundColor:cB,borderRadius:4},{label:'実績',data:d.actual.slice(0,ci+1),backgroundColor:cA,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+fmt(c.raw)+' 千円'}}}},scales:{y:{beginAtZero:true,ticks:{callback:function(v){return v.toLocaleString('ja-JP')}},title:{display:true,text:'千円'}}}}})}
mkC('chart-ippan',data.ippan,'rgba(74,144,217,0.3)','rgba(74,144,217,0.85)');mkC('chart-riyo',data.riyo,'rgba(80,181,120,0.3)','rgba(80,181,120,0.85)');mkC('chart-gaicyu',data.gaicyu,'rgba(232,135,90,0.3)','rgba(232,135,90,0.85)');
function mkT(tid,d,e){let h='<tr><th>月<\/th><th>予算<\/th><th>実績<\/th><th>差異<\/th><th>達成率<\/th><\/tr>';let bc=0,ac=0;for(let i=0;i<=ci;i++){const b=d.budget[i],a=d.actual[i],df=a!==null?a-b:null,c=dc(a,b,e),p=i===ci?' class="partial"':'';bc+=b;if(a!==null)ac+=a;h+='<tr'+p+'><td>'+months[i]+(i===ci?' *':'')+'<\/td><td>'+fmt(b)+'<\/td><td>'+fmt(a)+'<\/td><td class="'+c+'">'+(df!==null?(df>=0?'+':'')+fmt(df):'-')+'<\/td><td class="'+c+'">'+pct(a,b)+'<\/td><\/tr>'}const cd=ac-bc,cc=e?(cd>0?'negative':'positive'):(cd>=0?'positive':'negative');h+='<tr style="font-weight:600;border-top:2px solid #ccc"><td>累計<\/td><td>'+fmt(bc)+'<\/td><td>'+fmt(ac)+'<\/td><td class="'+cc+'">'+(cd>=0?'+':'')+fmt(cd)+'<\/td><td class="'+cc+'">'+pct(ac,bc)+'<\/td><\/tr>';document.getElementById(tid).innerHTML=h}
mkT('table-ippan',data.ippan,false);mkT('table-riyo',data.riyo,false);mkT('table-gaicyu',data.gaicyu,true);
</script>
</body>
</html>
