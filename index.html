<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フロンタル 予算実績ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif;background:#fff;color:#333;padding:20px}.container{max-width:1200px;margin:0 auto}h1{font-size:1.6rem;font-weight:600;margin-bottom:4px;color:#1a1a2e}.subtitle{color:#888;font-size:.85rem;margin-bottom:24px}.note{color:#c0392b;font-size:.78rem;margin-bottom:16px}.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}.card{background:#f8f9fa;border-radius:10px;padding:18px;border-left:4px solid #3498db}.card.green{border-left-color:#27ae60}.card.red{border-left-color:#e74c3c}.card.orange{border-left-color:#f39c12}.card-label{font-size:.78rem;color:#888;margin-bottom:4px}.card-value{font-size:1.5rem;font-weight:700}.card-sub{font-size:.75rem;color:#888;margin-top:2px}.section{margin-bottom:36px}.section h2{font-size:1.15rem;font-weight:600;margin-bottom:16px;color:#1a1a2e;border-bottom:2px solid #eee;padding-bottom:6px}.chart-container{position:relative;height:300px;margin-bottom:20px}table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:16px}th,td{padding:8px 12px;text-align:right;border-bottom:1px solid #eee}th{background:#f8f9fa;font-weight:600;color:#555}td:first-child,th:first-child{text-align:left}.positive{color:#27ae60}.negative{color:#e74c3c}.prov{font-size:.7rem;color:#c0392b;vertical-align:super}.footer{text-align:center;color:#aaa;font-size:.75rem;margin-top:40px;padding-top:16px;border-top:1px solid #eee}@media(max-width:768px){body{padding:12px}.chart-container{height:250px}th,td{padding:6px 8px;font-size:.78rem}.summary-cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
<h1>フロンタル株式会社 予算実績ダッシュボード</h1>
<p class="subtitle">2026年度（2026年1月〜3月）</p>
<p class="note">※ DriveDoorに接続できなかったため、1月・2月は確定値、3月は日報データによる速報値を使用しています。</p>
<div class="summary-cards" id="summaryCards"></div>
<div class="section"><h2>一般売上</h2><div class="chart-container"><canvas id="chartGeneral"></canvas></div><div id="tableGeneral"></div></div>
<div class="section"><h2>利用売上</h2><div class="chart-container"><canvas id="chartUsage"></canvas></div><div id="tableUsage"></div></div>
<div class="section"><h2>外注費</h2><div class="chart-container"><canvas id="chartOutsource"></canvas></div><div id="tableOutsource"></div></div>
<div class="section"><h2>累計進捗</h2><div id="tableCumulative"></div></div>
<div class="footer">最終更新: <span id="updateTime"></span> ｜ データソース: DriveDoor（フォールバック: ローカルデータ）</div>
</div>
<script>
const D={months:['1月','2月','3月'],general:{budget:[40260,41100,54000],actual:[41763,41480,25894],provisional:[false,false,true]},usage:{budget:[15800,19500,18200],actual:[13325,17439,6459],provisional:[false,false,true]},outsource:{budget:[16000,19000,15000],actual:[13147,15766,6002],provisional:[false,false,true]}};
function fmt(v){return v.toLocaleString('ja-JP')}function pct(a,b){return b?((a/b)*100).toFixed(1):'—'}function dc(d,inv){if(inv)return d>0?'negative':d<0?'positive':'';return d>0?'positive':d<0?'negative':''}
(function(){const el=document.getElementById('summaryCards');const items=[{l:'一般売上 累計実績',d:D.general,inv:false},{l:'利用売上 累計実績',d:D.usage,inv:false},{l:'外注費 累計実績',d:D.outsource,inv:true}];let h='';items.forEach(it=>{const sA=it.d.actual.reduce((a,b)=>a+b,0);const sB=it.d.budget.reduce((a,b)=>a+b,0);const r=pct(sA,sB);const c=it.inv?(sA>sB?'red':'green'):(sA>=sB?'green':(parseFloat(r)>80?'orange':'red'));h+='<div class="card '+c+'"><div class="card-label">'+it.l+'</div><div class="card-value">'+fmt(sA)+' <span style="font-size:0.7rem;color:#888">千円</span></div><div class="card-sub">予算 '+fmt(sB)+' 千円 ｜ 達成率 '+r+'%</div></div>'});const tA=D.general.actual.reduce((a,b)=>a+b,0)+D.usage.actual.reduce((a,b)=>a+b,0);const tB=D.general.budget.reduce((a,b)=>a+b,0)+D.usage.budget.reduce((a,b)=>a+b,0);const tR=pct(tA,tB);const tC=parseFloat(tR)>=100?'green':parseFloat(tR)>80?'orange':'red';h='<div class="card '+tC+'"><div class="card-label">売上合計 累計実績</div><div class="card-value">'+fmt(tA)+' <span style="font-size:0.7rem;color:#888">千円</span></div><div class="card-sub">予算 '+fmt(tB)+' 千円 ｜ 達成率 '+tR+'%</div></div>'+h;el.innerHTML=h})();
function mkChart(cid,data,cB,cA){const ctx=document.getElementById(cid).getContext('2d');new Chart(ctx,{type:'bar',data:{labels:D.months,datasets:[{label:'予算',data:data.budget,backgroundColor:cB,borderRadius:4,barPercentage:.7,categoryPercentage:.6},{label:'実績',data:data.actual,backgroundColor:data.actual.map((v,i)=>data.provisional[i]?'rgba(230,126,34,0.7)':cA),borderRadius:4,barPercentage:.7,categoryPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)+' 千円'}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fmt(v)},title:{display:true,text:'千円'}}}}})}
mkChart('chartGeneral',D.general,'rgba(52,152,219,0.35)','rgba(52,152,219,0.85)');mkChart('chartUsage',D.usage,'rgba(46,204,113,0.35)','rgba(46,204,113,0.85)');mkChart('chartOutsource',D.outsource,'rgba(231,76,60,0.35)','rgba(231,76,60,0.85)');
function mkTable(cid,data,inv){let h='<table><thead><tr><th>月</th><th>予算</th><th>実績</th><th>差異</th><th>達成率</th></tr></thead><tbody>';data.budget.forEach((b,i)=>{const a=data.actual[i];const d=a-b;const c=dc(d,inv);const p=data.provisional[i]?'<span class="prov">速報</span>':'';h+='<tr><td>'+D.months[i]+'</td><td>'+fmt(b)+'</td><td>'+fmt(a)+p+'</td><td class="'+c+'">'+(d>=0?'+':'')+fmt(d)+'</td><td>'+pct(a,b)+'%</td></tr>'});const sB=data.budget.reduce((a,b)=>a+b,0);const sA=data.actual.reduce((a,b)=>a+b,0);const sD=sA-sB;const c=dc(sD,inv);h+='<tr style="font-weight:600;border-top:2px solid #ccc"><td>累計</td><td>'+fmt(sB)+'</td><td>'+fmt(sA)+'</td><td class="'+c+'">'+(sD>=0?'+':'')+fmt(sD)+'</td><td>'+pct(sA,sB)+'%</td></tr></tbody></table>';document.getElementById(cid).innerHTML=h}
mkTable('tableGeneral',D.general,false);mkTable('tableUsage',D.usage,false);mkTable('tableOutsource',D.outsource,true);
(function(){let h='<table><thead><tr><th>項目</th><th>年間予算</th><th>累計実績</th><th>進捗率</th><th>残予算</th></tr></thead><tbody>';[{n:'一般売上',d:D.general,ab:[40260,41100,54000,42500,43800,44200,45000,43500,44800,45500,44000,46000]},{n:'利用売上',d:D.usage,ab:[15800,19500,18200,17000,18500,19000,20000,19200,19800,20500,19500,21000]},{n:'外注費',d:D.outsource,ab:[16000,19000,15000,16500,17000,17500,18000,17200,17800,18200,17500,18500]}].forEach(it=>{const an=it.ab.reduce((a,b)=>a+b,0);const cu=it.d.actual.reduce((a,b)=>a+b,0);h+='<tr><td>'+it.n+'</td><td>'+fmt(an)+'</td><td>'+fmt(cu)+'</td><td>'+pct(cu,an)+'%</td><td>'+fmt(an-cu)+'</td></tr>'});h+='</tbody></table>';document.getElementById('tableCumulative').innerHTML=h})();
document.getElementById('updateTime').textContent=new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
</script>
</body>
</html>
